services:
  - type: web
    name: jobtrack-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt
    healthCheckPath: /health/live
    # Migrations run on every deploy, before the new instance takes traffic.
    preDeployCommand: npx prisma migrate deploy
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: jobtrack-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          name: jobtrack-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: jobtrack-redis
          type: redis
          property: port
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

  - type: redis
    name: jobtrack-redis
    plan: free
    region: frankfurt
    ipAllowList: []

databases:
  - name: jobtrack-db
    plan: free
    region: frankfurt
